name: arafahijab

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: arafahijab-app:latest
    container_name: arafahijab-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4000
    # No "ports" mapping on purpose: the app is only reachable
    # from inside the Docker network (via nginx), never from the host.
    expose:
      - "4000"
    networks:
      - web
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  nginx:
    image: nginx:1.27-alpine
    container_name: arafahijab-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./certbot/www:/var/www/certbot:ro
    networks:
      - web

networks:
  web:
    driver: bridge
