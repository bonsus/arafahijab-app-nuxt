# Upstream Nuxt/Nitro app (internal Docker network only)
upstream nuxt_app {
    server app:4000;
    keepalive 32;
}

# ---------- HTTP ----------
# Serves the app over HTTP and handles the ACME (Let's Encrypt) challenge.
# Once SSL is set up, uncomment the redirect block below to force HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Let's Encrypt / certbot HTTP-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # --- SSL READY: uncomment to redirect all HTTP to HTTPS ---
    # location / {
    #     return 301 https://$host$request_uri;
    # }

    location / {
        proxy_pass http://nuxt_app;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
    }
}

